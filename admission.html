<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission Form - ABC College</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <h1 class="logo">ABC College</h1>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="admission.html">Admission</a></li>
                    <li><a href="cutoff.html">Cutoff</a></li>
                    <li><a href="merit.html">Merit</a></li>
                    <li><a href="admin.html">Admin</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="admission-form-section">
            <div class="container">
                <h2>Student Admission Form</h2>
                <form id="admissionForm" class="admission-form">
                    <div class="form-group">
                        <label for="name">Full Name:</label>
                        <input type="text" id="name" name="name" required>
                        <span class="error" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth:</label>
                        <input type="date" id="dob" name="dob" required>
                        <span class="error" id="dobError"></span>
                    </div>

                    <div class="form-group">
                        <label for="marks">Marks (out of 100):</label>
                        <input type="number" id="marks" name="marks" min="0" max="100" required>
                        <span class="error" id="marksError"></span>
                    </div>

                    <div class="form-group">
                        <label for="category">Category:</label>
                        <select id="category" name="category" required>
                            <option value="">Select Category</option>
                            <option value="General">General</option>
                            <option value="BC">BC</option>
                            <option value="MBC">MBC</option>
                            <option value="SC">SC</option>
                        </select>
                        <span class="error" id="categoryError"></span>
                    </div>

                    <div class="form-group">
                        <label for="course">Course:</label>
                        <select id="course" name="course" required>
                            <option value="">Select Course</option>
                            <option value="BSc Computer Science">BSc Computer Science</option>
                            <option value="BCA">BCA</option>
                            <option value="BCom">BCom</option>
                            <option value="BA English">BA English</option>
                            <option value="BSc Mathematics">BSc Mathematics</option>
                            <option value="BBA">BBA</option>
                        </select>
                        <span class="error" id="courseError"></span>
                    </div>

                    <button type="submit" class="btn">Submit Application</button>
                </form>

                <div id="successMessage" class="success-message" style="display: none;">
                    Application submitted successfully!
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 ABC College. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
